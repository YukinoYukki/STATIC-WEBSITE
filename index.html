<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeVerse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">ANIMEVERSE</div>

        <ul>
            <li>Home</li>
            <li>Popular</li>
            <li>New Releases</li>
            <li>My List</li>
        </ul>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>Watch Your Favorite Anime</h1>
            <p>
                Stream One Piece, Naruto, Dragon Ball,
                Fairy Tail, My Hero Academia and many more.
            </p>

            <button>Watch Now</button>
        </div>
    </section>

    <section class="anime-section">

        <h2>Trending Anime</h2>

        <div class="anime-row">

            <div class="anime-card">
                <img src="https://via.placeholder.com/220x320?text=One+Piece">
                <h3>One Piece</h3>
            </div>

            <div class="anime-card">
                <img src="https://via.placeholder.com/220x320?text=Naruto">
                <h3>Naruto</h3>
            </div>

            <div class="anime-card">
                <img src="https://via.placeholder.com/220x320?text=Dragon+Ball">
                <h3>Dragon Ball</h3>
            </div>

            <div class="anime-card">
                <img src="https://via.placeholder.com/220x320?text=Fairy+Tail">
                <h3>Fairy Tail</h3>
            </div>

            <div class="anime-card">
                <img src="https://via.placeholder.com/220x320?text=My+Hero+Academia">
                <h3>My Hero Academia</h3>
            </div>

        </div>

    </section>

    <footer>
        <p>© 2026 AnimeVerse Streaming Platform</p>
    </footer>

</body>
</html>
